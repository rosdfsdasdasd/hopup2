<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<title>Hop & Up</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; user-select:none; }

#ov .star {
  position: absolute;
  background: #f5e8c7;
  border-radius: 50%;
  box-shadow: 0 0 6px #c8a84b, 0 0 12px rgba(200,168,75,.6);
  pointer-events: none;
  animation: twinkle 2.8s infinite ease-in-out;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.35; }
  50% { opacity: 1; }
}

/* Декоративные облачка в меню — с нормальной формой */
#ov .cloud {
  position: absolute;
  pointer-events: none;
  filter: blur(0.5px);
}
#ov .cloud .puff {
  position: absolute;
  background: rgba(210, 225, 250, 0.42);
  border-radius: 50%;
  box-shadow: 0 0 16px rgba(195, 215, 250, 0.35);
}
body { background:#111009; display:flex; align-items:center; justify-content:center;
  min-height:100svh; overflow:hidden; }
#wrap { position:relative; }
canvas { display:block; border-radius:14px;
  box-shadow:0 0 0 1px rgba(200,168,75,.13), 0 8px 40px rgba(0,0,0,.7); }
#ov {
  position:absolute; inset:0; border-radius:14px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background: rgba(4,2,0,.45);
  border: 1px solid rgba(200,168,75,.22);
  box-shadow: inset 0 0 38px rgba(0,0,0,.25);
  backdrop-filter:blur(2.5px);
  z-index:10; text-align:center; padding:2rem; transition:opacity .3s;
}
#ov.hide { opacity:0; pointer-events:none; }

  text-shadow:0 0 26px rgba(200,168,75,.55), 0 2px 8px rgba(0,0,0,.6); margin-bottom:.15em; }
#ov-orn { color:#c8a84b; opacity:.35; font-size:1rem; letter-spacing:.6em; margin:.4rem 0; }
#ov-sub { font:italic .8rem Georgia,serif; color:#c8864a; margin-bottom:1.3rem; opacity:.75; }
#ov-sc  { font:700 2.6rem Georgia,serif; color:#c8a84b;
  text-shadow:0 0 14px rgba(200,168,75,.45); display:none; }
#ov-lbl { font:.52rem Georgia,serif; letter-spacing:.2em; text-transform:uppercase;
  color:#c8864a; opacity:.55; margin-bottom:1.2rem; display:none; }
.leg { display:flex; gap:12px; margin-bottom:1.4rem; justify-content:center; }
.li  { display:flex; flex-direction:column; align-items:center; gap:4px; }
.lb  { width:28px; height:5px; border-radius:2px; }
.lt  { font:.48rem Georgia,serif; letter-spacing:.09em; text-transform:uppercase;
  color:rgba(220,210,190,.32); }
.btns { display:flex; gap:10px; }
.btn-n {
  font:700 .85rem Georgia,serif; letter-spacing:.12em; text-transform:uppercase;
  color:#c8a84b; background:transparent; border:1px solid rgba(200,168,75,.38);
  padding:.65em 1.9em; border-radius:50px; cursor:pointer;
  transition: all .1s ease;
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
}
.btn-n:active { 
  background:rgba(200,168,75,.12); 
  transform: translateY(1px);
  border-color: rgba(200,168,75,.55);
}
.btn-h {
  font:700 .85rem Georgia,serif; letter-spacing:.1em; text-transform:uppercase;
  color:#c84040; background:transparent; border:1px solid rgba(200,50,30,.42);
  padding:.65em 1.4em; border-radius:50px; cursor:pointer;
  transition: all .1s ease;
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
}
.btn-h:active { 
  background:rgba(200,50,30,.12); 
  transform: translateY(1px);
  border-color: rgba(200,50,30,.6);
}
#score-hud {
  position:absolute; top:8px; left:0; right:0; pointer-events:none; z-index:5;
  text-align:center; font:700 1.35rem Georgia,serif;
  color:#f5e8c7;
  text-shadow: 0 0 10px rgba(0,0,0,.7), 0 1px 3px rgba(0,0,0,.8);
  letter-spacing:.06em;
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="score-hud">0</div>
  <div id="ov">
    <!-- Декоративные звёзды в меню -->
    <div class="star" style="top:12%; left:18%; width:2.5px; height:2.5px; animation-delay:0s;"></div>

    <div class="star" style="top:28%; left:11%; width:3.2px; height:3.2px; animation-delay:1.4s;"></div>

    <div class="star" style="top:53%; left:65%; width:1.6px; height:1.6px; animation-delay:1.8s;"></div>
    <div class="star" style="top:61%; left:14%; width:2.2px; height:2.2px; animation-delay:1.1s;"></div>
    <div class="star" style="top:68%; left:78%; width:3px; height:3px; animation-delay:2.5s;"></div>
    <div class="star" style="top:76%; left:32%; width:1.9px; height:1.9px; animation-delay:0.9s;"></div>
    <div class="star" style="top:82%; left:55%; width:2.6px; height:2.6px; animation-delay:1.6s;"></div>

    <h1 id="ov-title">Hop & Up</h1>
    <div id="ov-orn">— ✦ —</div>
    <div id="ov-sub">веди пальцем · тап = прыжок</div>
    <div id="ov-sc"></div>
    <div id="ov-lbl">высота</div>
    <div class="leg" id="ov-leg">
      <div class="li"><div class="lb" style="background:#555566;box-shadow:0 0 6px rgba(180,200,255,.4)"></div><div class="lt">платформа</div></div>
      <div class="li"><div class="lb" style="background:#1a4a3a;box-shadow:0 0 6px rgba(80,255,180,.4)"></div><div class="lt">энергия</div></div>

    <!-- Звук -->
    <div style="margin-top: 16px;">
      <button id="btn-sound" style="
        font:600 .72rem Georgia,serif; 
        letter-spacing:.06em; 
        color:#c8a84b; 
        background:rgba(30,24,16,.6); 
        border:1px solid rgba(200,168,75,.25);
        padding:.48em 1.3em; 
        border-radius:40px; 
        cursor:pointer;
        transition: all .1s ease;
      ">
        🔊 Звук: Вкл
      </button>

<script>
const cv  = document.getElementById('c');
const ctx = cv.getContext('2d');
const hud = document.getElementById('score-hud');
const OV  = document.getElementById('ov');
const W   = Math.min(360, window.innerWidth);
const H   = Math.min(640, window.innerHeight);
cv.width  = W; cv.height = H;
document.getElementById('wrap').style.cssText = `width:${W}px;height:${H}px`;
const rnd = (a,b) => a + Math.random()*(b-a);

// ── AUDIO ─────────────────────────────────────────────────────────
let soundEnabled = true;

// Загружаем настройку звука
try {
  const savedSound = localStorage.getItem('hopup_sound');
  if (savedSound !== null) {
    soundEnabled = savedSound === 'true';
  }
} catch(e) {}

const AC = new (window.AudioContext||window.webkitAudioContext)();
function resumeAC(){ if(AC.state==='suspended') AC.resume(); }

function playTone(freq, type, vol, attack, decay, pitchEnd) {
  if (!soundEnabled) return;
  try {
    const o = AC.createOscillator();
    const g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type = type;
    o.frequency.setValueAtTime(freq, AC.currentTime);
    if(pitchEnd) o.frequency.exponentialRampToValueAtTime(pitchEnd, AC.currentTime+attack+decay);
    g.gain.setValueAtTime(0, AC.currentTime);
    g.gain.linearRampToValueAtTime(vol, AC.currentTime+attack);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+attack+decay);
    o.start(AC.currentTime);
    o.stop(AC.currentTime+attack+decay+0.01);
  } catch(e){}
}
function playNoise(vol, duration, filterFreq) {
  if (!soundEnabled) return;
  try {
    const buf = AC.createBuffer(1, AC.sampleRate*duration, AC.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=rnd(-1,1);
    const src = AC.createBufferSource();
    const filt = AC.createBiquadFilter();
    const g = AC.createGain();
    src.buffer=buf; filt.type='bandpass'; filt.frequency.value=filterFreq||400;
    src.connect(filt); filt.connect(g); g.connect(AC.destination);
    g.gain.setValueAtTime(vol, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+duration);
    src.start(); src.stop(AC.currentTime+duration);
  } catch(e){}
}

const SFX = {
  jump() {
    // Мягкий, приятный прыжок
    playTone(285, 'sine', 0.19, 0.01, 0.23, 570);
  },

  land() {
    // Мягкая, приятная посадка
    playTone(152, 'sine', 0.16, 0.008, 0.15, 100);
    playNoise(0.065, 0.095, 310);
  },

  boost() {
    // Красивый, не резкий буст
    playTone(355, 'sine', 0.23, 0.012, 0.19, 1050);
    setTimeout(() => playTone(505, 'sine', 0.17, 0.01, 0.21, 1580), 55);
    setTimeout(() => playTone(710, 'sine', 0.13, 0.012, 0.28, 2200), 135);
  },

  die() {
    // Не резкая, но заметная смерть
    playTone(235, 'sine', 0.24, 0.012, 0.15, 70);
    setTimeout(() => playNoise(0.16, 0.40, 175), 35);
  },

  rocket() {
    // Приятный звук ракеты
    playTone(455, 'sine', 0.18, 0.01, 0.17, 830);
    setTimeout(() => playTone(670, 'sine', 0.14, 0.01, 0.22, 1120), 50);
  },

  milestone() {
    [0, 55, 120, 190].forEach((t, i) => {
      setTimeout(() => playTone([515, 650, 780, 1020][i], 'sine', 0.13, 0.01, 0.26), t);
    });
  },

  danger() {
    playTone(205, 'sine', 0.10, 0.01, 0.21, 140);
  },

  zoneUp() {
    playNoise(0.10, 0.44, 560);
    setTimeout(() => playTone(300, 'sine', 0.12, 0.02, 0.42, 800), 65);
  },
};

// === ВИБРАЦИЯ (работает только на реальных телефонах) ===
function vibrate(pattern) {
  try {
    if (navigator.vibrate) {
      navigator.vibrate(pattern);
    }
  } catch(e) {}
}


const G = 0.50, JUMP_V = -15.0, BOOST_V = -26.0, FALL_MAX = 20;
const PW = 7, PH = 18, PLAT_H = 13, LERP = 0.22, MAX_CHARGES = 2;

let raf, gs = 'idle', hardcore = false, onEndScreen = false;
let camY, score, best = 0, bestHC = 0;
let pl, plats, parts, rockets, rocketTimer, trail = [], rocketTrail = [], flashes = [];
let targetX = null, jumpQ = false;
let stars = [], clouds = [];
let zoneLabel = { text:'', alpha:0 };
let cosmicEvents = [], cosmicTimer = 0, cosmicIndex = 0;
let cityBuildings = [];
let shake = 0;
let rocketsCollectedThisRun = 0;

function loadBestScores() {
  try {
    const saved = localStorage.getItem('hopup_best');
    if (saved) {
      const data = JSON.parse(saved);
      best = data.normal || 0;
      bestHC = data.hardcore || 0;
    }
  } catch(e){}
}

function saveBestScores() {
  try {
    localStorage.setItem('hopup_best', JSON.stringify({
      normal: best,
      hardcore: bestHC
    }));
  } catch(e){}
}

function initCity() {
  cityBuildings = [];
  let cx = 0;
  while(cx < W+40) {
    const bw = rnd(18, 42);
    const bh = rnd(30, 110);
    const windows = [];
    for(let wy=0; wy<bh-8; wy+=rnd(7,11)) {
      for(let wx=4; wx<bw-4; wx+=rnd(6,10)) {
        windows.push({ x:wx, y:wy+4,
          lit: Math.random()>.45 ? (Math.random()>.35?'warm':'cool') : false });
      }
    }
    cityBuildings.push({ x:cx, w:bw, h:bh, windows,
      shade: rnd(0,1)>.5 });
    cx += bw + rnd(1,4);
  }
}

function initStars() {
  stars = [];
  for (let i = 0; i < 180; i++)
    stars.push({ x:rnd(0,W), y:rnd(0,H*3), size:rnd(0.6,2.2), alpha:rnd(0.4,1), speed:rnd(0.08,0.45), drift:rnd(-.015,.015) });
}

function mkPlat(wy, type, wide) {
  const veryNarrow = !hardcore && score >= 3500;
  const moreNarrow = !hardcore && score >= 2000;

  let w;
  if (wide) {
    w = hardcore ? rnd(W*.12,W*.18) : rnd(W*.24,W*.30);
  } else if (type==='dead') {
    w = hardcore ? rnd(W*.05,W*.10) : rnd(W*.08,W*.16);
  } else if (veryNarrow) {
    w = rnd(W*.05, W*.09);
  } else if (moreNarrow) {
    w = rnd(W*.07, W*.13);
  } else {
    w = hardcore ? rnd(W*.05,W*.10) : rnd(W*.10,W*.18);
  }

  const x = rnd(4, W-w-4);
  const speedBoost = hardcore ? 0 : Math.min(0.8, score/4000);
  const spd = (hardcore ? rnd(1.3,2.9) : rnd(0.7,1.8)) + speedBoost;
  const vx = type==='move' ? spd*(Math.random()<0.5?1:-1) : 0;
  return { x, wy, w, vx, type, ph:rnd(0,6.28), crumble:undefined };
}

function pickT(sc) {
  const d = hardcore ? Math.min(.45,Math.max(0,(sc-10)/180)) : Math.min(.27,Math.max(0,(sc-28)/300));
  const mBase = hardcore ? .2 : (sc>=2000 ? Math.min(.6, .1+sc/1200) : Math.min(.36,.1+sc/500));
  const m = Math.min(mBase, hardcore ? .45 : .62);
  const r = Math.random();
  if ((hardcore?sc>10:sc>28) && r<d) return 'dead';
  if (r < d+m) return 'move';
  return 'safe';
}

function init() {
  score=0; camY=0; parts=[]; rockets=[]; rocketTimer=300; trail=[]; rocketTrail=[]; flashes=[]; shake=0;
  cosmicEvents=[]; cosmicTimer=0; cosmicIndex=0;
  targetX=null; jumpQ=false;
  rocketsCollectedThisRun = 0;
  initStars(); initClouds(); initCity();
  pl = { x:W/2, wy:H-75, vy:0, sq:1, sqT:0, dead:false, dt:0,
         charges:MAX_CHARGES, chargePop:0, chargeFlashSlot:-1, boostT:0 };
  plats = [{ x:W/2-W*.15, wy:H-50, w:hardcore?W*.14:W*.30, vx:0, type:'safe', ph:0, crumble:undefined }];
  let gy = H-50;
  for (let i=0;i<36;i++) {
    gy -= hardcore ? rnd(44,78) : rnd(48,84);
    plats.push(mkPlat(gy, i<(hardcore?3:6)?'safe':pickT(0), i<(hardcore?3:6)));
  }
}

function puff(x,y,r,g,b) {
  for(let i=0;i<6;i++){
    const a=rnd(-2.7,-.4);
    parts.push({x,y,vx:Math.cos(a)*rnd(.6,3),vy:Math.sin(a)*rnd(.6,3),life:1,rr:rnd(1.2,3.5),r,g,b});
  }
}

// === НОВЫЕ СЛИТНЫЕ ЭФФЕКТЫ (тёплые, атмосферные, в стиле игры) ===

// Мягкая посадка — тёплая пыль, поднимающаяся вверх (гораздо спокойнее старого)
function softLandEffect(x, y) {
  for(let i = 0; i < 10; i++) {
    const spread = rnd(-8, 8);
    parts.push({
      x: x + spread,
      y: y + rnd(-1.5, 3.5),
      vx: spread * 0.09 + rnd(-0.25, 0.25),
      vy: rnd(-1.8, -0.35),
      life: rnd(0.5, 0.9),
      rr: rnd(1.3, 2.6),
      r: 200 + rnd(0, 30),
      g: 168 + rnd(0, 22),
      b: 118 + rnd(0, 18)
    });
  }
}

// Эффектное разрушение платформы — будто отламываются кусочки и падают вниз
function elegantCrumble(p) {
  const cx = p.x + p.w / 2;
  const cy = p.wy - camY + PLAT_H / 2;
  const baseCol = p.type === 'move' ? [70, 200, 140] : 
                  p.type === 'dead' ? [180, 70, 40] : [160, 170, 200];

  // Мелкая пыль
  for(let i = 0; i < 9; i++) {
    parts.push({
      x: cx + rnd(-p.w * 0.48, p.w * 0.48),
      y: cy + rnd(-2, 4),
      vx: rnd(-0.5, 0.5),
      vy: rnd(-1.0, -0.15),
      life: rnd(0.45, 0.85),
      rr: rnd(0.8, 1.7),
      r: baseCol[0] + rnd(20, 50),
      g: baseCol[1] + rnd(-10, 20),
      b: baseCol[2] + rnd(-15, 10)
    });
  }

  // Падающие кусочки-обломки (прямоугольники)
  for(let i = 0; i < 8; i++) {
    const size = rnd(3.5, 7.5);
    parts.push({
      x: cx + rnd(-p.w * 0.42, p.w * 0.42),
      y: cy + rnd(-1, 4),
      vx: rnd(-1.4, 1.4),
      vy: rnd(1.6, 3.5),
      life: rnd(0.85, 1.35),
      rr: size,                    // используем как размер
      r: baseCol[0] + rnd(-15, 25),
      g: baseCol[1] + rnd(-20, 15),
      b: baseCol[2] + rnd(-20, 10),
      shape: 'rect',
      w: size * (0.7 + Math.random() * 0.6),
      h: size * (0.6 + Math.random() * 0.5),
      angle: rnd(-0.8, 0.8),
      rotSpeed: rnd(-0.12, 0.12)
    });
  }

  // 2-3 более крупных куска
  for(let i = 0; i < 3; i++) {
    const size = rnd(6, 10);
    parts.push({
      x: cx + rnd(-p.w * 0.32, p.w * 0.32),
      y: cy + rnd(0, 5),
      vx: rnd(-0.9, 0.9),
      vy: rnd(2.4, 4.2),
      life: rnd(1.0, 1.5),
      rr: size,
      r: baseCol[0] + rnd(-10, 20),
      g: baseCol[1] + rnd(-15, 10),
      b: baseCol[2] + rnd(-15, 5),
      shape: 'rect',
      w: size * 1.1,
      h: size * 0.85,
      angle: rnd(-1.2, 1.2),
      rotSpeed: rnd(-0.09, 0.09)
    });
  }

  addScreenShake(0.9);
}

function burst(x,y,r,g,b,n,spread) {
  for(let i=0;i<n;i++){
    const a=rnd(0,6.28);
    parts.push({x,y,vx:Math.cos(a)*rnd(1,spread),vy:Math.sin(a)*rnd(1,spread)-1.5,life:1,rr:rnd(2,5.5),r,g,b});
  }
}
function tickP() {
  for(const p of parts){p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.life-=.055;}
  parts=parts.filter(p=>p.life>0);
  for(const t of rocketTrail){
    t.x+=t.vx; t.y+=t.vy; t.vx*=.985; t.vy+=t.gravity||0; t.life-=t.decay;
  }
  rocketTrail=rocketTrail.filter(t=>t.life>0);
  for(const f of flashes){f.life-=f.decay;}
  flashes=flashes.filter(f=>f.life>0);
}

function addScreenShake(amount) {
  shake = Math.max(shake, amount);
}

function addRocketTrail(x,y,intensity=1) {
  const n = Math.floor(3 + intensity*5);
  for(let i=0;i<n;i++){
    rocketTrail.push({
      x:x+rnd(-5,5), y:y+rnd(6,16),
      vx:rnd(-1.1,1.1), vy:rnd(1.3,4.5)*intensity,
      life:rnd(.55,.95), decay:rnd(.035,.06),
      r:255, g:Math.floor(rnd(135,220)), b:Math.floor(rnd(40,95)),
      size:rnd(3,7)*intensity, gravity:.025
    });
  }
}

// ── ATMOSPHERE ────────────────────────────────────────────────────
function initClouds() {
  clouds = [];
  for(let i=0;i<18;i++)
    clouds.push({
      x:rnd(-W*.25,W*1.15), wy:rnd(-H*2, H*6),
      w:rnd(54,145), h:rnd(16,34), alpha:rnd(.16,.34),
      speed:rnd(.035,.14), layer:rnd(.35,1), seed:rnd(0,99)
    });
}

function lerpCol(a, b, t) {
  t = Math.max(0,Math.min(1,t));
  return [
    Math.round(a[0]+(b[0]-a[0])*t),
    Math.round(a[1]+(b[1]-a[1])*t),
    Math.round(a[2]+(b[2]-a[2])*t),
  ];
}

function zoneFactor() {
  if(hardcore) return Math.min(3, score/1200);
  if(score < 1500) return score/1500;
  if(score < 4000) return 1+(score-1500)/2500;
  if(score < 6000) return 2+(score-4000)/2000;
  return 3;
}

function drawBg() {
  const zf = hardcore ? Math.min(3, score/900) : zoneFactor();

  let skyTop, skyBot;

  if (hardcore) {
    // Мрачный кроваво-тёмный стиль для Хардкора
    skyTop = [
      [28, 5, 6],     // зона 0 — тёмно-красный
      [32, 6, 8],     // зона 1 — кровавый
      [18, 3, 6],     // зона 2 — тёмно-фиолетовый
      [5, 1, 3],      // зона 3 — почти чёрный с красным
    ];
    skyBot = [
      [48, 8, 9],
      [38, 7, 10],
      [20, 4, 7],
      [8, 2, 4],
    ];
  } else {
    skyTop = [
      [11,7,24],
      [8,20,50],
      [4,10,30],
      [2,2,8],
    ];
    skyBot = [
      [30,22,14],
      [20,30,60],
      [8,14,35],
      [4,3,10],
    ];
  }

  const zi = Math.min(2, Math.floor(zf));
  const zt = zf - zi;
  const ct = lerpCol(skyTop[zi], skyTop[zi+1]||skyTop[3], zt);
  const cb = lerpCol(skyBot[zi], skyBot[zi+1]||skyBot[3], zt);

  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, `rgb(${ct[0]},${ct[1]},${ct[2]})`);
  g.addColorStop(1, `rgb(${cb[0]},${cb[1]},${cb[2]})`);
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

  if(zf<2.5){
    const nebA=Math.max(0,(2.5-zf)/2.5)*0.14;
    const neb=ctx.createRadialGradient(W*.3,H*.4,50,W*.7,H*.7,260);
    neb.addColorStop(0,`rgba(90,50,140,${nebA})`); neb.addColorStop(1,'transparent');
    ctx.fillStyle=neb; ctx.fillRect(0,0,W,H);
  }

  const starVis = Math.min(1, Math.max(0,(zf-0.3)/1.2));
  if(starVis>0){
    const now=Date.now();
    for(const s of stars){
      const parallax = 0.3 + zf*0.18;
      let sy=(s.y - camY*s.speed*parallax)%(H*3.5);
      let sx=(s.x + camY*s.drift) % W;
      if(sx<0) sx+=W;
      if(sy<-3||sy>H+3) continue;
      ctx.globalAlpha=s.alpha*starVis*(0.7+0.3*Math.sin(now/300+s.x));
      const sz = s.size*(0.7+zf*0.2);
      // Reddish stars in hardcore
      ctx.fillStyle = hardcore ? '#ffcccc' : '#fff';
      ctx.fillRect(sx, sy, sz, sz);
    }
    ctx.globalAlpha=1;
  }

  const cityA = Math.max(0, 1 - zf*1.4);
  if(cityA > 0 && !hardcore) {
    ctx.save(); ctx.globalAlpha=cityA;

    const hg=ctx.createLinearGradient(0,H*0.52,0,H);
    hg.addColorStop(0,'transparent');
    hg.addColorStop(1,`rgba(70,38,14,${cityA*.85})`);
    ctx.fillStyle=hg; ctx.fillRect(0,H*0.52,W,H*0.48);

    const off = (camY*0.12) % H;
    for(const b of cityBuildings){
      const by = H - b.h + off*0.3;
      ctx.fillStyle = b.shade ? '#191420' : '#110e18';
      ctx.fillRect(b.x, by, b.w, b.h+10);
      ctx.fillStyle=`rgba(90,65,130,${cityA*.45})`;
      ctx.fillRect(b.x, by, b.w, 1.5);
      for(const w of b.windows){
        if(!w.lit) continue;
        ctx.fillStyle = w.lit==='warm'
          ? `rgba(255,185,75,${rnd(.5,.8)})`
          : `rgba(190,215,255,${rnd(.35,.65)})`;
        ctx.fillRect(b.x+w.x, by+w.y, 3, 4);
      }
      if(b.w>26 && b.h>65){
        const ah=b.antH||(b.antH=rnd(10,20));
        ctx.strokeStyle=`rgba(70,55,90,${cityA*.75})`; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(b.x+b.w/2,by); ctx.lineTo(b.x+b.w/2,by-ah); ctx.stroke();
        if(Math.sin(Date.now()/700+b.x*0.1)>0.5){
          ctx.fillStyle=`rgba(255,55,55,${cityA*.85})`;
          ctx.beginPath(); ctx.arc(b.x+b.w/2,by-ah,1.3,0,6.28); ctx.fill();
        }
      }
    }
    ctx.restore();
  }

  // Clouds in hardcore are red-tinted and visible from the start
  const cloudVis = hardcore 
    ? Math.max(0.45, 1 - Math.abs(zf-1)*0.4)   // always quite visible
    : Math.max(0, 1 - Math.abs(zf-1)*.72);
  if(cloudVis>0){
    ctx.save();
    for(const cl of clouds){
      const depth = .06 + cl.speed*cl.layer;
      let cy=(cl.wy - camY*depth)%(H*3.2);
      if(cy<-40) cy+=H*3.2;
      if(cy>H+60) continue;
      const drift = Math.sin(Date.now()/2600 + cl.wy*.01) * 10 * cl.layer;
      const cx = cl.x + drift;
      const a = cl.alpha*cloudVis;

      ctx.globalAlpha=a*.28;
      ctx.fillStyle = hardcore ? 'rgba(210,110,110,1)' : 'rgba(160,185,220,1)';
      ctx.beginPath();
      ctx.ellipse(cx+cl.w*.50,cy+cl.h*.70,cl.w*.62,cl.h*.42,0,0,6.28);
      ctx.fill();

      ctx.globalAlpha=a*.92;
      ctx.fillStyle = hardcore ? 'rgba(235,145,145,1)' : 'rgba(205,220,245,1)';
      ctx.beginPath();
      ctx.arc(cx+cl.w*.25, cy+cl.h*.58, cl.h*.48, 0, 6.28);
      ctx.arc(cx+cl.w*.42, cy+cl.h*.42, cl.h*.70, 0, 6.28);
      ctx.arc(cx+cl.w*.62, cy+cl.h*.50, cl.h*.58, 0, 6.28);
      ctx.arc(cx+cl.w*.78, cy+cl.h*.62, cl.h*.42, 0, 6.28);
      ctx.ellipse(cx+cl.w*.50,cy+cl.h*.70,cl.w*.40,cl.h*.38,0,0,6.28);
      ctx.fill();

      ctx.globalAlpha=a*.34;
      ctx.fillStyle = hardcore ? 'rgba(160,60,60,1)' : 'rgba(95,125,180,1)';
      ctx.beginPath();
      ctx.ellipse(cx+cl.w*.55,cy+cl.h*.82,cl.w*.42,cl.h*.22,0,0,6.28);
      ctx.fill();

      ctx.globalAlpha=a*.38;
      ctx.strokeStyle='rgba(235,245,255,1)';
      ctx.lineWidth=1;
      ctx.beginPath();
      ctx.arc(cx+cl.w*.36, cy+cl.h*.42, cl.h*.45, 3.25, 5.75);
      ctx.arc(cx+cl.w*.60, cy+cl.h*.48, cl.h*.38, 3.65, 5.85);
      ctx.stroke();
    }
    ctx.globalAlpha=1;
    ctx.restore();
  }
}

function drawFlashes() {
  for(const f of flashes){
    const t=f.life;
    const age=1-t;

    if(f.kind==='jump'){
      const power=f.power||1;
      ctx.save();

      ctx.globalAlpha=t*.50;
      ctx.fillStyle='rgba(70,190,255,1)';
      ctx.beginPath();
      ctx.ellipse(f.x,f.y+4, (16+age*40)*power, (5+age*13)*power, 0, 0, 6.28);
      ctx.fill();

      ctx.globalAlpha=t*.42;
      const plume=ctx.createLinearGradient(f.x,f.y-36*power,f.x,f.y+16*power);
      plume.addColorStop(0,'rgba(90,220,255,0)');
      plume.addColorStop(.42,'rgba(120,225,255,.85)');
      plume.addColorStop(1,'rgba(255,220,105,.85)');
      ctx.fillStyle=plume;
      ctx.beginPath();
      ctx.moveTo(f.x-7*power,f.y+10*power);
      ctx.quadraticCurveTo(f.x-18*power,f.y-8*power,f.x-5*power,f.y-34*power);
      ctx.quadraticCurveTo(f.x+8*power,f.y-8*power,f.x+7*power,f.y+10*power);
      ctx.closePath();
      ctx.fill();

      ctx.globalAlpha=t*.95;
      ctx.strokeStyle=`rgba(210,245,255,${t})`;
      ctx.lineWidth=2.2+t*2.2;
      ctx.beginPath();
      ctx.ellipse(f.x,f.y+5, (10+age*42)*power, (3+age*13)*power, 0, 0, 6.28);
      ctx.stroke();

      ctx.globalAlpha=t*.72;
      ctx.strokeStyle=`rgba(255,230,150,${t})`;
      ctx.lineWidth=1.6;
      for(let i=0;i<11;i++){
        const a=-3.0+i*.30;
        const inner=5+age*5;
        const outer=18+age*32;
        ctx.beginPath();
        ctx.moveTo(f.x+Math.cos(a)*inner*power, f.y+Math.sin(a)*inner*.55*power);
        ctx.lineTo(f.x+Math.cos(a)*outer*power, f.y+Math.sin(a)*outer*.75*power);
        ctx.stroke();
      }

      for(const s of f.sparks||[]){
        const x=f.x+s.x+s.vx*age*24;
        const y=f.y+s.y+s.vy*age*22;
        ctx.globalAlpha=t*.9;
        ctx.fillStyle='rgba(210,245,255,1)';
        ctx.beginPath(); ctx.arc(x,y,Math.max(.5,s.r*t*1.25),0,6.28); ctx.fill();
      }
      ctx.restore();
      continue;
    }

    const col=f.type==='move'?'90,255,175':'225,235,255';
    const hot=f.type==='move'?'210,255,230':'255,245,205';
    const shards=f.shards||[];
    ctx.save();

    ctx.globalAlpha=t*.82;
    ctx.strokeStyle=`rgba(${hot},${t})`;
    ctx.lineWidth=1.1;
    for(let i=-1;i<=1;i++){
      const y=f.y+i*3;
      const half=f.w*(.40-age*.18)*(1-Math.abs(i)*.22);
      ctx.beginPath();
      ctx.moveTo(f.x-half,y+rnd(-.8,.8));
      ctx.lineTo(f.x+half,y+rnd(-.8,.8));
      ctx.stroke();
    }

    ctx.globalAlpha=t*.62;
    ctx.strokeStyle=`rgba(${col},${t})`;
    ctx.lineWidth=.8;
    for(let i=0;i<7;i++){
      const px=f.x+rnd(-f.w*.45,f.w*.45);
      const py=f.y+rnd(-5,5);
      ctx.beginPath();
      ctx.moveTo(px-rnd(4,9),py+rnd(-2,2));
      ctx.lineTo(px+rnd(4,9),py+rnd(-2,2));
      ctx.stroke();
    }

    for(const s of shards){
      const x=f.x+s.x+s.vx*age*18;
      const y=f.y+s.y+s.vy*age*14;
      ctx.globalAlpha=t*.72;
      ctx.fillStyle=`rgba(${hot},1)`;
      ctx.save();
      ctx.translate(x,y);
      ctx.rotate((s.spin||0)*age*6);
      ctx.beginPath();
      ctx.moveTo(0, -s.r);
      ctx.lineTo(s.r*1.4, 0);
      ctx.lineTo(0, s.r);
      ctx.lineTo(-s.r*.9, 0);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
    ctx.restore();
  }
}

function drawRocketTrail() {
  for(const t of rocketTrail){
    ctx.save();
    ctx.globalAlpha=Math.max(0,t.life);
    const rg=ctx.createRadialGradient(t.x,t.y,0,t.x,t.y,t.size*t.life*2.4);
    rg.addColorStop(0,`rgba(255,245,210,.9)`);
    rg.addColorStop(.28,`rgba(${t.r},${t.g},${t.b},.8)`);
    rg.addColorStop(1,'rgba(255,90,25,0)');
    ctx.fillStyle=rg;
    ctx.beginPath(); ctx.arc(t.x,t.y,t.size*t.life*2.4,0,6.28); ctx.fill();
    ctx.restore();
  }
}

// ── COSMIC EVENTS ─────────────────────────────────────────────────
function tickCosmicEvents() {
  cosmicTimer--;
  if(cosmicTimer<=0){
    // В хардкоре события спавнятся очень часто для максимальной динамики (TikTok style)
    cosmicTimer = hardcore 
      ? Math.floor(rnd(45, 110))   // very frequent from the very beginning
      : Math.floor(rnd(500, 1000));

    const types=['shooting_star','satellite','meteor'];
    const type=types[cosmicIndex % 3];
    cosmicIndex++;
    const isSat=type==='satellite';
    const vx=isSat?rnd(-2.2,-1.4):rnd(-3.5,-2.0);
    const vy=isSat?rnd(-0.6,-0.2):rnd(1.2,2.2);
    const ay=isSat?rnd(0.012,0.022):0;
    const startX=W+40;
    const startY=rnd(H*.05,H*.2);
    const tail=[];
    if(!isSat){
      for(let i=22;i>=0;i--)
        tail.push({x:startX+i*(-vx), y:startY+i*(-vy)});
    }
    cosmicEvents.push({
      type,x:startX,y:startY,vx,vy,ay,
      alpha:1,phase:'hold',
      holdT:isSat?380:80,
      tail,
      angle:0,
      blinkT:0,
    });
  }

  for(const e of cosmicEvents){
    if(e.phase==='hold'){e.holdT--;if(e.holdT<=0)e.phase='out';}
    else{e.alpha=Math.max(0,e.alpha-0.025);}

    if(e.type==='satellite'){
      e.vy += (e.ay||0);
      e.angle=(e.angle||0)+0.012;
      e.blinkT=(e.blinkT||0)+1;
    } else {
      e.tail.push({x:e.x,y:e.y});
      if(e.tail.length>24)e.tail.shift();
    }
    e.x+=e.vx; e.y+=e.vy;
    if(e.x<-50){e.phase='out';e.alpha=0;}
  }
  cosmicEvents=cosmicEvents.filter(e=>e.alpha>0||e.phase==='hold');
}

function drawCosmicEvents() {
  for(const e of cosmicEvents){
    if(e.alpha<=0) continue;
    ctx.save(); ctx.globalAlpha=e.alpha;

    if(e.type==='shooting_star'){
      for(let i=1;i<e.tail.length;i++){
        const t=i/e.tail.length;
        ctx.strokeStyle=`rgba(220,235,255,${t*0.85})`;
        ctx.lineWidth=t*1.8;
        ctx.beginPath(); ctx.moveTo(e.tail[i-1].x,e.tail[i-1].y);
        ctx.lineTo(e.tail[i].x,e.tail[i].y); ctx.stroke();
      }
      ctx.fillStyle='rgba(240,248,255,0.95)';
      ctx.beginPath(); ctx.arc(e.x,e.y,1.8,0,6.28); ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=.5;
      ctx.beginPath(); ctx.moveTo(e.x-3,e.y); ctx.lineTo(e.x+3,e.y); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(e.x,e.y-3); ctx.lineTo(e.x,e.y+3); ctx.stroke();

    } else if(e.type==='satellite'){
      ctx.save();
      ctx.translate(e.x, e.y);
      const tiltAngle = Math.atan2(e.vy, e.vx);
      ctx.rotate(tiltAngle + (e.angle||0)*0.08);

      ctx.fillStyle='#c8d8e8';
      ctx.beginPath(); ctx.roundRect(-7,-4,14,8,2); ctx.fill();
      ctx.fillStyle='#e8f2fc';
      ctx.beginPath(); ctx.roundRect(-6,-3,12,3,1); ctx.fill();
      ctx.fillStyle='rgba(0,0,0,.25)';
      ctx.fillRect(-7,2,14,2);
      ctx.fillStyle='rgba(80,140,200,.5)';
      ctx.fillRect(-7,-0.5,14,1);

      ctx.fillStyle='#1a3a8a';
      ctx.beginPath(); ctx.roundRect(-22,-3,13,6,1); ctx.fill();
      ctx.strokeStyle='rgba(100,160,255,.5)'; ctx.lineWidth=.6;
      ctx.beginPath(); ctx.moveTo(-17,-3); ctx.lineTo(-17,3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(-13,-3); ctx.lineTo(-13,3); ctx.stroke();
      ctx.fillStyle='rgba(100,180,255,.18)';
      ctx.beginPath(); ctx.roundRect(-22,-3,13,2.5,1); ctx.fill();

      ctx.fillStyle='#1a3a8a';
      ctx.beginPath(); ctx.roundRect(9,-3,13,6,1); ctx.fill();
      ctx.strokeStyle='rgba(100,160,255,.5)'; ctx.lineWidth=.6;
      ctx.beginPath(); ctx.moveTo(13,-3); ctx.lineTo(13,3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(17,-3); ctx.lineTo(17,3); ctx.stroke();
      ctx.fillStyle='rgba(100,180,255,.18)';
      ctx.beginPath(); ctx.roundRect(9,-3,13,2.5,1); ctx.fill();

      ctx.strokeStyle='rgba(180,200,220,.7)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(-9,0); ctx.lineTo(-9,-1); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(9,0); ctx.lineTo(9,-1); ctx.stroke();

      ctx.strokeStyle='rgba(210,220,235,.8)'; ctx.lineWidth=.8;
      ctx.beginPath(); ctx.moveTo(2,-4); ctx.lineTo(5,-9); ctx.stroke();
      ctx.strokeStyle='rgba(220,230,245,.9)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(5,-9,3.5,3.5,6.0); ctx.stroke();

      const blink=Math.sin((e.blinkT||0)*0.18)>.4;
      ctx.fillStyle=blink?'rgba(80,255,100,1)':'rgba(80,255,100,.15)';
      ctx.beginPath(); ctx.arc(3,1.5,1.2,0,6.28); ctx.fill();

      ctx.restore();

    } else {
      for(let i=1;i<e.tail.length;i++){
        const t=i/e.tail.length;
        ctx.strokeStyle=`rgba(255,${140+Math.floor(80*t)},${40+Math.floor(40*t)},${t*0.9})`;
        ctx.lineWidth=t*2.2;
        ctx.beginPath(); ctx.moveTo(e.tail[i-1].x,e.tail[i-1].y);
        ctx.lineTo(e.tail[i].x,e.tail[i].y); ctx.stroke();
      }
      ctx.fillStyle='rgba(255,220,120,0.95)';
      ctx.beginPath(); ctx.arc(e.x,e.y,2.5,0,6.28); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.7)';
      ctx.beginPath(); ctx.arc(e.x,e.y,1,0,6.28); ctx.fill();
    }

    ctx.restore();
  }
}
function drawPlat(p) {
  const sy=p.wy-camY;
  if(sy>H+20||sy<-20) return;

  const pulse=.5+.5*Math.sin(p.ph*1.8);
  const c=p.crumble, crumbling=c!==undefined;
  const alpha=crumbling?Math.max(0.08,c):1;
  let ox=0,oy=0;
  if(crumbling&&c<.8){const sk=(0.8-c)*7;ox=rnd(-sk,sk);oy=rnd(-sk*.45,sk*.45);}

  ctx.save(); ctx.globalAlpha=alpha; ctx.translate(ox,oy);
  const x=p.x, w=p.w, h=PLAT_H, depth=5;
  if(crumbling){
    const sh=1-c;
    ctx.translate(x+w/2, sy+h/2);
    ctx.scale(1+sh*.18, 1-sh*.34);
    ctx.translate(-(x+w/2), -(sy+h/2));
  }

  if(p.type==='safe') {
    ctx.fillStyle='#1e1e2e';
    ctx.fillRect(x,sy+h,w,depth);
    ctx.fillStyle='rgba(0,0,0,.4)';
    ctx.fillRect(x+w-2,sy,2,h+depth);

    ctx.save(); ctx.beginPath(); ctx.roundRect(x,sy,w,h,3); ctx.clip();
    ctx.fillStyle='#4a4a60'; ctx.fillRect(x,sy,w,h);
    const panelW=Math.max(8,w/4);
    for(let px=x;px<x+w;px+=panelW){
      ctx.fillStyle='rgba(255,255,255,.03)';
      ctx.fillRect(px,sy,Math.min(panelW*.55,w-(px-x)),h);
      ctx.fillStyle='rgba(0,0,0,.06)';
      ctx.fillRect(px+panelW*.55,sy,Math.min(panelW*.45,w-(px-x+panelW*.55)),h);
    }
    const bandY=sy+Math.floor(h*.38);
    ctx.fillStyle=`rgba(160,180,255,${.22+.14*pulse})`;
    ctx.fillRect(x+2,bandY,w-4,2);
    ctx.fillStyle='rgba(255,255,255,.28)'; ctx.fillRect(x,sy,w,1.5);
    ctx.fillStyle='rgba(180,190,255,.12)'; ctx.fillRect(x,sy+1.5,w,1);
    ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(x,sy+h-1.5,w,1.5);
    ctx.restore();

    if(w>20){
      for(const [bx,by] of [[x+4,sy+h/2],[x+w-4,sy+h/2]]){
        ctx.fillStyle='#2a2a3a'; ctx.beginPath(); ctx.arc(bx,by,2,0,6.28); ctx.fill();
        ctx.strokeStyle='rgba(160,180,255,.4)'; ctx.lineWidth=.6;
        ctx.beginPath(); ctx.arc(bx,by,2,0,6.28); ctx.stroke();
      }
    }

  } else if(p.type==='move') {
    ctx.fillStyle='#0a1e10';
    ctx.fillRect(x,sy+h,w,depth);
    ctx.fillStyle='rgba(0,0,0,.35)';
    ctx.fillRect(x+w-2,sy,2,h+depth);

    ctx.save(); ctx.beginPath(); ctx.roundRect(x,sy,w,h,3); ctx.clip();
    ctx.fillStyle='#183824'; ctx.fillRect(x,sy,w,h);

    const lineSpacing=2.8;
    for(let ly=sy+1;ly<sy+h-1;ly+=lineSpacing){
      ctx.fillStyle=`rgba(60,220,140,${.06+.04*Math.sin((ly-sy)*2+p.ph*3)})`;
      ctx.fillRect(x,ly,w,1.2);
    }
    const cBand=sy+h*.4;
    ctx.fillStyle=`rgba(80,255,170,${.28+.22*pulse})`;
    ctx.fillRect(x+1,cBand,w-2,2.5);

    ctx.fillStyle='rgba(100,255,160,.35)'; ctx.fillRect(x,sy,w,1.5);
    ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(x,sy+h-1.5,w,1.5);
    ctx.restore();

    if(w>16){
      const dir=p.vx>0?1:-1, ax=x+w/2, ay=sy+h/2;
      ctx.fillStyle=`rgba(160,255,200,${.65+.3*pulse})`;
      ctx.beginPath();
      ctx.moveTo(ax-dir*5,ay-3); ctx.lineTo(ax+dir*6.5,ay); ctx.lineTo(ax-dir*5,ay+3);
      ctx.closePath(); ctx.fill();
    }

  } else {
    ctx.fillStyle='#1a0300';
    ctx.fillRect(x,sy+h,w,depth);
    ctx.fillStyle=`rgba(255,60,5,${.35+.25*pulse})`;
    ctx.fillRect(x+1,sy+h,w-2,1.5);
    ctx.fillStyle='rgba(0,0,0,.4)';
    ctx.fillRect(x+w-2,sy,2,h+depth);

    ctx.save(); ctx.beginPath(); ctx.roundRect(x,sy,w,h,3); ctx.clip();
    ctx.fillStyle='#1e0604'; ctx.fillRect(x,sy,w,h);
    const fw=Math.max(7,w/4);
    for(let fx=x;fx<x+w;fx+=fw){
      const fw2=Math.min(fw,x+w-fx);
      ctx.fillStyle='rgba(80,10,5,.18)'; ctx.fillRect(fx,sy,fw2*.5,h);
      ctx.fillStyle='rgba(0,0,0,.12)'; ctx.fillRect(fx+fw2*.5,sy,fw2*.5,h);
    }
    const nC=Math.max(2,Math.floor(w/11));
    for(let i=0;i<nC;i++){
      const cx=x+(i+.5)*(w/nC)+rnd(-1,1);
      ctx.strokeStyle='rgba(0,0,0,.9)'; ctx.lineWidth=1.4;
      ctx.beginPath(); ctx.moveTo(cx,sy); ctx.lineTo(cx+rnd(-1.5,1.5),sy+h); ctx.stroke();
      ctx.strokeStyle=`rgba(255,${50+Math.floor(70*pulse)},5,${.55+.35*pulse})`;
      ctx.lineWidth=.5;
      ctx.beginPath(); ctx.moveTo(cx,sy+1); ctx.lineTo(cx+rnd(-.5,.5),sy+h-1); ctx.stroke();
    }
    ctx.fillStyle=`rgba(255,70,8,${.75+.2*pulse})`; ctx.fillRect(x,sy,w,1.5);
    ctx.fillStyle=`rgba(180,30,3,${.4+.2*pulse})`; ctx.fillRect(x,sy+1.5,w,1.5);
    ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(x,sy+h-1.5,w,1.5);
    ctx.restore();

    const nSpikes=Math.max(2,Math.floor(w/10)), sw2=w/nSpikes;
    for(let i=0;i<nSpikes;i++){
      const spx=x+i*sw2+sw2*.5, sph=5+3.5*pulse;
      ctx.fillStyle='#1a0402';
      ctx.beginPath(); ctx.moveTo(spx-sw2*.3,sy); ctx.lineTo(spx,sy-sph); ctx.lineTo(spx+sw2*.3,sy); ctx.closePath(); ctx.fill();
      ctx.fillStyle=`rgba(220,60,8,${.5+.3*pulse})`;
      ctx.beginPath(); ctx.moveTo(spx-sw2*.3,sy); ctx.lineTo(spx,sy-sph); ctx.lineTo(spx,sy); ctx.closePath(); ctx.fill();
    }
  }

  if(crumbling&&c<.8){
    ctx.save();
    ctx.beginPath(); ctx.rect(x+ox,sy+oy,w,h); ctx.clip();
    const ca=(0.8-c)/0.8;
    ctx.strokeStyle=`rgba(255,245,190,${ca*.72})`; ctx.lineWidth=.9;
    const n=Math.max(1,Math.floor(w/12));
    for(let i=0;i<n;i++){
      const cx3=x+(i+.5)*(w/n)+rnd(-2,2);
      ctx.beginPath(); ctx.moveTo(cx3,sy); ctx.lineTo(cx3+rnd(-3,3),sy+h); ctx.stroke();
    }
    ctx.strokeStyle=`rgba(120,220,255,${ca*.35})`; ctx.lineWidth=.5;
    for(let i=0;i<3;i++){
      const lx=x+rnd(2,w-2), ly=sy+rnd(2,h-2);
      ctx.beginPath(); ctx.moveTo(lx-5,ly+rnd(-1,1)); ctx.lineTo(lx+5,ly+rnd(-1,1)); ctx.stroke();
    }
    ctx.restore();
  }

  ctx.restore();
}

function drawRockets() {
  for(const rk of rockets){
    const sy=rk.wy-camY+Math.sin(rk.bob)*4;
    if(sy<-40||sy>H+40) continue;

    if(rk.collected){
      const t=1-rk.popT/20;
      ctx.save(); ctx.globalAlpha=(1-t)*.9;
      ctx.strokeStyle='rgba(80,220,255,1)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(rk.x,sy,18+t*30,0,6.28); ctx.stroke();
      ctx.strokeStyle=`rgba(255,255,255,${(1-t)*.4})`; ctx.lineWidth=.8;
      ctx.beginPath(); ctx.arc(rk.x,sy,18+t*30+4,0,6.28); ctx.stroke();
      ctx.restore(); continue;
    }

    ctx.save();
    const pulse=.5+.5*Math.sin(rk.bob*2);
    ctx.strokeStyle=`rgba(100,220,255,${.35+.2*pulse})`; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(rk.x,sy,17,0,6.28); ctx.stroke();
    ctx.strokeStyle=`rgba(160,235,255,${.7+.2*pulse})`; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(rk.x,sy,13,0,6.28); ctx.stroke();
    ctx.fillStyle=`rgba(80,200,255,${.06+.04*pulse})`;
    ctx.beginPath(); ctx.arc(rk.x,sy,13,0,6.28); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.25)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(rk.x-3,sy-3,7,3.8,5.6); ctx.stroke();
    ctx.font='12px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='rgba(255,255,255,.92)';
    ctx.fillText('🚀',rk.x,sy+1);
    if(Math.random()<.65) addRocketTrail(rk.x, sy+9, .42);
    ctx.restore();
  }
}

function drawPlayer() {
  if(pl.dead) return;
  const sx=pl.x, sy=pl.wy-camY;

  ctx.save();
  const glowA = .22 + Math.min(.34,(pl.boostT||0)/55*.34) + (pl.charges/MAX_CHARGES)*.08;
  const glow=ctx.createRadialGradient(sx,sy-7,2,sx,sy-7,32+(pl.boostT||0)*.18);
  glow.addColorStop(0,`rgba(145,225,255,${glowA})`);
  glow.addColorStop(.45,`rgba(95,170,255,${glowA*.45})`);
  glow.addColorStop(1,'rgba(95,170,255,0)');
  ctx.fillStyle=glow;
  ctx.beginPath(); ctx.arc(sx,sy-7,34+(pl.boostT||0)*.1,0,6.28); ctx.fill();

  ctx.save(); ctx.globalAlpha=.15; ctx.fillStyle='#000';

  ctx.fillStyle='#b8ccd8';
  ctx.beginPath(); ctx.roundRect(-5,5,4,7,2); ctx.fill();
  ctx.beginPath(); ctx.roundRect(1,5,4,7,2); ctx.fill();
  ctx.fillStyle='rgba(0,0,0,.2)';
  ctx.beginPath(); ctx.roundRect(-5,9,4,3,1); ctx.fill();
  ctx.beginPath(); ctx.roundRect(1,9,4,3,1); ctx.fill();

  ctx.beginPath(); ctx.roundRect(-6,11,5,2.5,1); ctx.fill();
  ctx.beginPath(); ctx.roundRect(1,11,5,2.5,1); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.18)';
  ctx.fillRect(-5.5,11,3.5,.8);
  ctx.fillRect(1.5,11,3.5,.8);

  const tg=ctx.createLinearGradient(-7,-6,7,-6);
  tg.addColorStop(0,'#c8daea'); tg.addColorStop(.35,'#e8f2fa'); tg.addColorStop(.7,'#d0e0ee'); tg.addColorStop(1,'#a8c0d4');
  ctx.fillStyle=tg;
  ctx.beginPath(); ctx.roundRect(-7,-6,14,12,4); ctx.fill();
  ctx.strokeStyle='rgba(100,140,180,.3)'; ctx.lineWidth=.6;
  ctx.beginPath(); ctx.roundRect(-7,-6,14,12,4); ctx.stroke();
  ctx.fillStyle='rgba(0,0,0,.1)'; ctx.fillRect(-7,-6,2.5,12);

  ctx.fillStyle='rgba(60,120,200,.3)';
  ctx.beginPath(); ctx.roundRect(-4,-4,8,5,2); ctx.fill();
  ctx.strokeStyle='rgba(120,180,255,.4)'; ctx.lineWidth=.5;
  ctx.beginPath(); ctx.roundRect(-4,-4,8,5,2); ctx.stroke();
  ctx.fillStyle='rgba(160,220,255,.75)';
  ctx.beginPath(); ctx.arc(-2,-2,1.2,0,6.28); ctx.fill();
  ctx.fillStyle='rgba(100,255,160,.7)';
  ctx.beginPath(); ctx.arc(2,-2,1.2,0,6.28); ctx.fill();

  const armG=ctx.createLinearGradient(-11,0,6,0);
  armG.addColorStop(0,'#a8bece'); armG.addColorStop(1,'#c8daea');
  ctx.fillStyle=armG;
  ctx.beginPath(); ctx.roundRect(-11,-4,5,8,3); ctx.fill();
  ctx.beginPath(); ctx.roundRect(6,-4,5,8,3); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.2)';
  ctx.fillRect(-10.5,-3.5,1.5,3);
  ctx.fillRect(6.5,-3.5,1.5,3);
  ctx.fillStyle='#8898b0';
  ctx.beginPath(); ctx.arc(-8,5,2.5,0,6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(8,5,2.5,0,6.28); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.2)';
  ctx.beginPath(); ctx.arc(-8.5,4.2,1,0,6.28); ctx.fill();

  const hg=ctx.createRadialGradient(2,-15,2,0,-12,10);
  hg.addColorStop(0,'#e8f2fc'); hg.addColorStop(.6,'#c8daf0'); hg.addColorStop(1,'#a8c0e0');
  ctx.fillStyle=hg;
  ctx.beginPath(); ctx.arc(0,-12,9,0,6.28); ctx.fill();
  ctx.strokeStyle='rgba(120,160,210,.55)'; ctx.lineWidth=.8;
  ctx.beginPath(); ctx.arc(0,-12,9,0,6.28); ctx.stroke();

  ctx.fillStyle='rgba(20,50,100,.55)';
  ctx.beginPath(); ctx.ellipse(0,-12,6.5,6,.05,0,6.28); ctx.fill();
  const vg=ctx.createRadialGradient(-1,-14,1,-1,-13,7);
  vg.addColorStop(0,'rgba(140,210,255,.85)');
  vg.addColorStop(.5,'rgba(70,140,230,.65)');
  vg.addColorStop(1,'rgba(20,60,160,.45)');
  ctx.fillStyle=vg;
  ctx.beginPath(); ctx.ellipse(0,-12,5.8,5.2,.05,0,6.28); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.5)';
  ctx.beginPath(); ctx.ellipse(-2,-14.5,2.8,1.4,-.4,0,6.28); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.2)';
  ctx.beginPath(); ctx.ellipse(1,-11,1.2,.6,.3,0,6.28); ctx.fill();
  ctx.strokeStyle='rgba(80,160,240,.7)'; ctx.lineWidth=.7;
  ctx.beginPath(); ctx.ellipse(0,-12,5.8,5.2,.05,0,6.28); ctx.stroke();

  ctx.restore();

  const dotR=4, gap=11, totalW=MAX_CHARGES*dotR*2+(MAX_CHARGES-1)*gap;
  const dotY=sy+PH*.54+12;
  for(let i=0;i<MAX_CHARGES;i++){
    const dx=sx-totalW/2+i*(dotR*2+gap)+dotR;
    const filled=i<pl.charges;
    const isFlashing=pl.chargePop>0 && i===pl.chargeFlashSlot;
    const popF=isFlashing?pl.chargePop/8:0;
    const scale=filled?(1+popF*.5):1;

    if(isFlashing){
      ctx.save(); ctx.globalAlpha=popF*.5;
      ctx.strokeStyle='rgba(120,220,255,1)'; ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.arc(dx,dotY,dotR*(2.0-popF*.3),0,6.28); ctx.stroke();
      ctx.restore();
    }

    ctx.save(); ctx.translate(dx,dotY); ctx.scale(scale,scale);
    ctx.beginPath(); ctx.arc(0,0,dotR,0,6.28);
    if(filled){
      const dg=ctx.createRadialGradient(0,-1.2,0,0,0,dotR);
      dg.addColorStop(0,'rgba(230,248,255,1)');
      dg.addColorStop(.4,'rgba(120,210,255,1)');
      dg.addColorStop(1,'rgba(60,150,240,.9)');
      ctx.fillStyle=dg; ctx.fill();
      ctx.strokeStyle='rgba(180,235,255,.6)'; ctx.lineWidth=.7;
      ctx.beginPath(); ctx.arc(0,0,dotR,0,6.28); ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,.5)';
      ctx.beginPath(); ctx.arc(-1.2,-1.5,1.2,0,6.28); ctx.fill();
    } else {
      ctx.strokeStyle='rgba(100,180,220,.3)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(0,0,dotR,0,6.28); ctx.stroke();
    }
    ctx.restore();
  }
}

function drawVig() {
  const zf = zoneFactor();
  const v=ctx.createRadialGradient(W/2,H/2,H*.2,W/2,H/2,H*.78);
  v.addColorStop(0,'transparent'); v.addColorStop(1,'rgba(4,3,8,.65)');
  ctx.fillStyle=v; ctx.fillRect(0,0,W,H);

  // Динамичная красная пульсирующая виньетка в хардкоре (для зрелищности)
  if (hardcore) {
    const pulse = 0.5 + Math.sin(Date.now() / 260) * 0.5;
    const redV = ctx.createRadialGradient(W/2, H/2, H*0.25, W/2, H/2, H*0.92);
    redV.addColorStop(0, 'transparent');
    redV.addColorStop(1, `rgba(140, 20, 25, ${0.09 + pulse * 0.11})`);
    ctx.fillStyle = redV;
    ctx.fillRect(0, 0, W, H);
  }

  if(zf<1.2 && !hardcore){
    const fogA=Math.max(0,(1.2-zf)/1.2)*0.18;
    const fg=ctx.createLinearGradient(0,H*0.7,0,H);
    fg.addColorStop(0,'transparent');
    fg.addColorStop(1,`rgba(30,18,8,${fogA})`);
    ctx.fillStyle=fg; ctx.fillRect(0,H*0.7,W,H*0.3);
  }
  if(zf>1.8 && !hardcore){
    const coldA=Math.min(.12,(zf-1.8)*.08);
    const cg=ctx.createLinearGradient(0,0,0,H*0.25);
    cg.addColorStop(0,`rgba(100,160,255,${coldA})`);
    cg.addColorStop(1,'transparent');
    ctx.fillStyle=cg; ctx.fillRect(0,0,W,H*0.25);
  }
}

function update() {
  if(pl.sqT>0){pl.sqT--;pl.sq+=(1-pl.sq)*.28;}else pl.sq=1;
  if(pl.chargePop>0) pl.chargePop--;

  if(pl.dead){pl.dt--;tickP();if(pl.dt<=0)showEnd();return;}

  if(targetX!==null) pl.x+=(targetX-pl.x)*LERP;
  if(pl.x<-PW) pl.x=W+PW; if(pl.x>W+PW) pl.x=-PW;

  if(jumpQ){
    jumpQ=false;
    if(pl.charges>0){
      pl.charges--;pl.chargePop=8;pl.vy=JUMP_V;
      // Красивые частицы полёта при прыжке (вместо кривого сжатия)
      for(let i = 0; i < 14; i++) {
        const angle = (Math.PI * 0.6) + (Math.random() * Math.PI * 0.8);
        const speed = 1.8 + Math.random() * 2.2;
        parts.push({
          x: pl.x,
          y: pl.wy - camY + PH * 0.6,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed + 0.8,
          life: 0.55 + Math.random() * 0.35,
          rr: 1.6 + Math.random() * 1.8,
          r: 180 + Math.floor(Math.random() * 60),
          g: 210 + Math.floor(Math.random() * 45),
          b: 255
        });
      }
      softLandEffect(pl.x, pl.wy - camY + PH * .45);
      SFX.jump();
      vibrate(25); // лёгкая вибрация при прыжке
    }
  }

  pl.vy=Math.min(pl.vy+G,FALL_MAX);
  const prevWY=pl.wy; pl.wy+=pl.vy;

  if(pl.vy>0){
    const prevFeet=prevWY+PH*.45, feet=pl.wy+PH*.45;
    for(const p of plats){
      if(prevFeet<=p.wy&&feet>=p.wy&&pl.x>=p.x-PW&&pl.x<=p.x+p.w+PW){
        if(p.type==='dead'){pl.dead=true;pl.dt=52;burst(pl.x,p.wy-camY,215,45,10,20,6);SFX.die();vibrate(120);return;}
        pl.wy=p.wy-PH*.45;pl.vy=JUMP_V;pl.sq=.55;pl.sqT=9;
        const prev=pl.charges;
        pl.charges=Math.min(MAX_CHARGES,pl.charges+1);
        pl.chargePop=8;pl.chargeFlashSlot=prev;
        SFX.land();
        softLandEffect(pl.x, p.wy - camY + PH * .4);
        vibrate(p.type === 'move' ? 35 : 45); // посадка
        if(p.type !== 'dead' && p.crumble === undefined) {
          p.crumble = 1.0;
          elegantCrumble(p);
        }
        break;
      }
    }
  }

  for(const p of plats){
    if(p.vx){p.x+=p.vx;if(p.x<3||p.x+p.w>W-3)p.vx*=-1;}
    p.ph=(p.ph+.042)%6.28;
    if(p.crumble!==undefined){
      p.crumble-=hardcore?.045:.030;
      if(Math.random()<.22){
        const bx=p.x+rnd(0,p.w),by=p.wy-camY;
        const col=p.type==='move'?[70,230,160]:[160,170,200];
        parts.push({x:bx,y:by,vx:rnd(-1.8,1.8),vy:rnd(-2.2,.1),life:.38+rnd(0,.22),rr:rnd(.6,1.5),r:col[0],g:col[1],b:col[2]});
      }
    }
  }
  plats=plats.filter(p=>p.crumble===undefined||p.crumble>0);

  const tCamY=pl.wy-H*.38;
  if(tCamY<camY){
    const oldScore=score;
    const sh=camY-tCamY;camY=tCamY;score+=Math.round(sh*.38);
    if(!hardcore&&score>best)best=score;
    if(hardcore&&score>bestHC)bestHC=score;
    const milestones=[1000,2000,4000,6000];
    const zoneNames={1500:'Cloud Layer', 4000:'Thin Air', 6000:'Outer Space'};
    const zoneTriggers=[1500,4000,6000];
    for(const m of zoneTriggers){
      if(oldScore<m && score>=m){
        SFX.zoneUp();
        zoneLabel = { text: zoneNames[m], alpha: 1.0 };
      }
    }
    for(const m of milestones){
      if(oldScore<m && score>=m) SFX.milestone();
    }
  }

  let topWY=Math.min(...plats.map(p=>p.wy));
  while(topWY>camY-H*.1){
    topWY-=hardcore?rnd(44,78):rnd(48,84);
    plats.push(mkPlat(topWY,pickT(score),false));
  }
  plats=plats.filter(p=>p.wy-camY<H+80);

  rocketTimer--;
  if(rocketTimer<=0){
    rocketTimer=Math.floor(rnd(280,560));
    if(Math.random()<.55)
      rockets.push({
        x:rnd(26,W-26), wy:camY+rnd(H*.08,H*.7),
        vx:rnd(.65,1.55)*(Math.random()<.5?-1:1),
        vy:rnd(-.10,.10),
        bob:rnd(0,6.28), phase:rnd(0,6.28),
        dodge:rnd(.45,1.05), collected:false,popT:0
      });
  }
  for(const rk of rockets){
    if(rk.collected){if(rk.popT>0)rk.popT--;continue;}
    rk.bob=(rk.bob+.05)%6.28;
    rk.phase=(rk.phase+.055)%6.28;
    rk.vx+=Math.sin(rk.phase*1.7)*.025*rk.dodge;
    rk.vx=Math.max(-2.05,Math.min(2.05,rk.vx));
    rk.x+=rk.vx+Math.sin(rk.phase)*.75*rk.dodge;
    rk.wy+=rk.vy+Math.cos(rk.phase*.8)*.28*rk.dodge;
    if(rk.x<22){rk.x=22;rk.vx=Math.abs(rk.vx);}
    if(rk.x>W-22){rk.x=W-22;rk.vx=-Math.abs(rk.vx);}
    if(Math.random()<.35) addRocketTrail(rk.x,rk.wy-camY+10,.32);
    const dy=pl.wy-rk.wy,dx=pl.x-rk.x;
    if(Math.sqrt(dx*dx+dy*dy)<20){
      rk.collected=true;rk.popT=20;pl.vy=BOOST_V;pl.charges=MAX_CHARGES;pl.chargePop=8;pl.boostT=48;
      rocketsCollectedThisRun++;
      addScreenShake(18);
      SFX.boost(); SFX.rocket();
      vibrate([40, 25, 70]); // двойная вибрация при бусте
      burst(pl.x,rk.wy-camY,100,200,255,22,6);
      addRocketTrail(pl.x,rk.wy-camY,1.8);
      for(let i=0;i<14;i++)
        parts.push({x:pl.x+rnd(-5,5),y:rk.wy-camY+rnd(0,10),vx:rnd(-1.5,1.5),vy:rnd(1,4),life:.85,rr:rnd(3,6),r:255,g:Math.floor(rnd(120,200)),b:40});
    }
  }
  rockets=rockets.filter(rk=>!rk.collected||rk.popT>0);
  rockets=rockets.filter(rk=>rk.wy-camY<H+60);

  tickP();
  if(pl.boostT>0){
    pl.boostT--;
    if(Math.random()<.95) addRocketTrail(pl.x,pl.wy-camY+PH*.35,1.05);
  }
  if(!pl.dead){
    trail.push({x:pl.x,y:pl.wy-camY,life:1, boost:(pl.boostT||0)>0});
    if(trail.length>18)trail.shift();
  }
  for(const t of trail)t.life-=0.055;
  trail=trail.filter(t=>t.life>0);

  if(zoneLabel.alpha>0) zoneLabel.alpha=Math.max(0,zoneLabel.alpha-.008);
  tickCosmicEvents();

  if(pl.wy-camY>H+80)showEnd();

  const tier = score>=3500 ? ' ⚡' : score>=2000 ? ' ▲' : '';
  hud.textContent=(hardcore?'☠ ':'')+score+tier;
}

function frame(){
  update();
  const s = shake>0 ? shake : 0;
  const kick = s ? 1 + Math.sin(Date.now()*.055)*.25 : 0;
  const ox = s ? rnd(-s,s)*kick : 0, oy = s ? rnd(-s*.75,s*.75)*kick : 0;
  if(shake>0) shake*=.90;
  if(shake<.25) shake=0;
  ctx.save();
  ctx.translate(ox,oy);
  drawBg();
  drawCosmicEvents();
  plats.forEach(drawPlat);
  drawFlashes();
  drawRockets();
  drawRocketTrail();
  parts.forEach(p=>{
    ctx.save();
    ctx.globalAlpha = p.life * 0.82;
    ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},1)`;

    if (p.shape === 'rect') {
      // Падающий кусочек платформы
      ctx.translate(p.x, p.y);
      ctx.rotate((p.angle || 0) + (p.rotSpeed || 0) * (1 - p.life) * 18);
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    } else {
      // Обычная круглая пыль
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.rr * p.life, 0, 6.28);
      ctx.fill();
    }
    ctx.restore();
  });
  drawPlayer();
  if(zoneLabel.alpha>0){
    const a=zoneLabel.alpha;
    ctx.save();
    ctx.globalAlpha=a*.55;
    ctx.font='300 0.65rem "Georgia",serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.letterSpacing='0.25em';
    ctx.fillStyle='rgba(190,215,255,1)';
    ctx.fillText(zoneLabel.text.toUpperCase(), W/2, 32);
    const tw=ctx.measureText(zoneLabel.text.toUpperCase()).width+10;
    ctx.strokeStyle=`rgba(160,200,255,${a*.3})`; ctx.lineWidth=.5;
    ctx.beginPath(); ctx.moveTo(W/2-tw/2,38); ctx.lineTo(W/2+tw/2,38); ctx.stroke();
    ctx.restore();
  }
  drawVig();
  ctx.restore();
  raf=requestAnimationFrame(frame);
}

function start(hc){
  hardcore=!!hc;
  onEndScreen = false;
  OV.classList.add('hide');
  document.getElementById('score-hud').style.display = 'block'; // показываем счётчик только в игре

  // Сбрасываем класс кнопки "Хардкор"
  const btnHard = document.getElementById('btn-hard');
  btnHard.classList.remove('btn-n');
  btnHard.classList.add('btn-h');
  btnHard.textContent = '☠ Хардкор';

  // Убираем статистику смерти если есть
  const deathStats = document.getElementById('death-stats');
  if (deathStats) deathStats.remove();

  // Сбрасываем стили кнопок (на случай после смерти)
  const btnNormReset = document.getElementById('btn-norm');
  const btnHardReset = document.getElementById('btn-hard');
  const btnsReset = document.querySelector('.btns');
  if (btnNormReset) btnNormReset.style.cssText = '';
  if (btnHardReset) btnHardReset.style.cssText = '';
  if (btnsReset) {
    btnsReset.style.flexDirection = '';
    btnsReset.style.alignItems = '';
    btnsReset.style.gap = '';
    btnsReset.style.cssText = '';
  }

  // Удаляем созданный ряд кнопок если есть
  const bottomRow = document.getElementById('end-bottom-row');
  if (bottomRow) bottomRow.remove();

  // Сбрасываем стили кнопки звука
  const soundBtn = document.getElementById('btn-sound');
  if (soundBtn) {
    soundBtn.style.fontSize = '';
    soundBtn.style.padding = '';
    soundBtn.style.margin = '';
  }

  init();
  gs='playing';
  if(raf)cancelAnimationFrame(raf);
  frame();
}

function showEnd(){
  gs='dead';
  onEndScreen = true;
  cancelAnimationFrame(raf);
  document.getElementById('score-hud').style.display = 'none'; // скрываем счётчик в меню/конце
  
  // Save best scores
  if (!hardcore && score > best) best = score;
  if (hardcore && score > bestHC) bestHC = score;
  saveBestScores();

  const b=hardcore?bestHC:best;
  const rec=score>=b&&score>0;
  
  document.getElementById('ov-title').textContent=rec?(hardcore?'☠ Рекорд!':'✦ Рекорд!'):'Конец пути';
  document.getElementById('ov-sub').textContent=rec?'новая высота!':'попробуй ещё раз';
  
  const sc=document.getElementById('ov-sc');
  sc.textContent=score;
  sc.style.display='block';
  document.getElementById('ov-lbl').style.display='block';
  document.getElementById('ov-leg').style.display='none';
  
  // Clean up old dynamic stats if any
  const oldStats = document.getElementById('end-stats');
  if (oldStats) oldStats.remove();
  
  // Показываем улучшенную статистику на экране смерти
  const zoneNames = {0: 'Земля', 1: 'Облака', 2: 'Стратосфера', 3: 'Космос'};
  const currentZone = Math.min(3, Math.floor(zoneFactor()));
  const bestScore = hardcore ? bestHC : best;

  // Создаём блок статистики (без "Очки")
  const statsHTML = `
    <div style="margin: 6px 0 16px; font-size:0.82rem; color:#c8b48a; line-height:1.6;">
      <div><span style="color:#a89870;">Лучший результат:</span> <span style="color:#f5e8c7; font-weight:700;">${bestScore}</span></div>
      <div><span style="color:#a89870;">Зона:</span> <span style="color:#f5e8c7;">${zoneNames[currentZone]}</span></div>
    </div>
  `;

  // Вставляем статистику перед кнопками
  const btnsContainerStats = document.querySelector('.btns');
  if (btnsContainerStats) {
    const oldStats = document.getElementById('death-stats');
    if (oldStats) oldStats.remove();

    const statsDiv = document.createElement('div');
    statsDiv.id = 'death-stats';
    statsDiv.innerHTML = statsHTML;
    btnsContainerStats.parentNode.insertBefore(statsDiv, btnsContainerStats);
  }

  document.getElementById('btn-norm').textContent = 'Снова';
  document.getElementById('btn-hard').textContent='В меню';
  document.getElementById('btn-hard').classList.remove('btn-h');
  document.getElementById('btn-hard').classList.add('btn-n');

  // === НОВЫЙ ЛЕЙАУТ: Большая "Снова" сверху, под ней в ряд "В меню" + Звук ===
  const btnNorm = document.getElementById('btn-norm');
  const btnHardBtn = document.getElementById('btn-hard');
  const btnSound = document.getElementById('btn-sound');
  const btnsContainer = document.querySelector('.btns');

  if (btnsContainer && btnSound) {
    // Большая кнопка "Снова"
    btnNorm.style.cssText = 'font-size:1.1rem; padding:.9em 3.6em; margin-bottom:14px; width:auto;';

    // Кнопка "В меню"
    btnHardBtn.style.cssText = 'font-size:.82rem; padding:.58em 1.9em;';

    // Кнопка звука — только размер, остальной дизайн остаётся
    btnSound.style.fontSize = '.72rem';
    btnSound.style.padding = '.48em 1.1em';
    btnSound.style.margin = '0';

    // Делаем .btns колонкой
    btnsContainer.style.cssText = 'flex-direction:column; align-items:center; gap:10px; width:100%;';

    // Создаём горизонтальный ряд под большой кнопкой для двух кнопок
    let bottomRow = document.getElementById('end-bottom-row');
    if (!bottomRow) {
      bottomRow = document.createElement('div');
      bottomRow.id = 'end-bottom-row';
      bottomRow.style.cssText = 'display:flex; gap:10px; justify-content:center; align-items:center;';
      btnsContainer.appendChild(bottomRow);
    }

    // Перемещаем кнопки в ряд
    bottomRow.appendChild(btnHardBtn);
    bottomRow.appendChild(btnSound);
  }

  OV.classList.remove('hide');
}

cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  resumeAC();
  if(gs!=='playing') return;
  const r=cv.getBoundingClientRect();
  targetX=e.touches[0].clientX-r.left;
  jumpQ=true;
},{passive:false});

cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(gs!=='playing') return;
  const r=cv.getBoundingClientRect();
  targetX=e.touches[0].clientX-r.left;
},{passive:false});

cv.addEventListener('touchend',e=>{
  e.preventDefault();
  if(e.touches.length===0) targetX=null;
},{passive:false});

let md=false;
cv.addEventListener('mousedown',e=>{
  resumeAC();
  if(gs!=='playing') return;
  md=true;
  const r=cv.getBoundingClientRect();
  targetX=e.clientX-r.left;
  jumpQ=true;
});

cv.addEventListener('mousemove',e=>{
  if(!md || gs!=='playing') return;
  const r=cv.getBoundingClientRect();
  targetX=e.clientX-r.left;
});

cv.addEventListener('mouseup',()=>{md=false;targetX=null;});
cv.addEventListener('mouseleave',()=>{md=false;targetX=null;});

document.getElementById('btn-norm').addEventListener('click',e=>{
  e.stopPropagation();
  const oldStats = document.getElementById('end-stats');
  if (oldStats) oldStats.remove();

  // Если мы на экране смерти — перезапускаем в текущем режиме (хардкор или обычный)
  if (onEndScreen) {
    start(hardcore);
  } else {
    start(false);
  }
});

document.getElementById('btn-norm').addEventListener('touchend',e=>{
  e.preventDefault(); e.stopPropagation();
  const oldStats = document.getElementById('end-stats');
  if (oldStats) oldStats.remove();

  if (onEndScreen) {
    start(hardcore);
  } else {
    start(false);
  }
});

document.getElementById('btn-hard').addEventListener('click',e=>{
  e.stopPropagation();
  const oldStats = document.getElementById('end-stats');
  if (oldStats) oldStats.remove();

  const btn = document.getElementById('btn-hard');

  if (btn.textContent === 'В меню') {
    // Надёжный возврат в меню (перезагрузка страницы)
    location.reload();
  } else {
    start(true);
  }
});

document.getElementById('btn-hard').addEventListener('touchend',e=>{
  e.preventDefault(); e.stopPropagation();
  const oldStats = document.getElementById('end-stats');
  if (oldStats) oldStats.remove();

  const btn = document.getElementById('btn-hard');

  if (btn.textContent === 'В меню') {
    location.reload();
  } else {
    start(true);
  }
});

// === ЗВУК TOGGLE ===
const btnSound = document.getElementById('btn-sound');

function updateSoundButton() {
  if (!btnSound) return;
  btnSound.textContent = soundEnabled ? '🔊 Звук: Вкл' : '🔇 Звук: Выкл';
  btnSound.style.borderColor = soundEnabled 
    ? 'rgba(200,168,75,.38)' 
    : 'rgba(180,100,80,.4)';
}

btnSound.addEventListener('click', () => {
  soundEnabled = !soundEnabled;
  try {
    localStorage.setItem('hopup_sound', soundEnabled);
  } catch(e) {}
  updateSoundButton();
});

btnSound.addEventListener('touchend', (e) => {
  e.preventDefault();
  soundEnabled = !soundEnabled;
  try {
    localStorage.setItem('hopup_sound', soundEnabled);
  } catch(e) {}
  updateSoundButton();
});

// Устанавливаем начальное состояние кнопки
updateSoundButton();

// Load best scores on start
loadBestScores();

// Скрываем счётчик в меню при загрузке
document.getElementById('score-hud').style.display = 'none';

// Рисуем фон меню с облаками (форсируем зону, где облака видны)
const oldScore = score;
score = 1800;           // зона, где облака хорошо видны
drawBg();
score = oldScore;       // возвращаем 0

drawVig();
</script>
